<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirect...</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 24px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      background: #2E90D0;
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>

  <script>
    (() => {
      const links = {
        android:
          'https://play.google.com/store/apps/details?id=app.hiddify.com',

        apple:
          'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973',

        windows:
          'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe',

        linux:
          'https://github.com/hiddify/hiddify-next/releases/latest'
      };

      const ua =
        navigator.userAgent || navigator.vendor || window.opera;

      // Android
      if (/android/i.test(ua)) {
        window.location.replace(links.android);
        return;
      }

      // Apple devices + macOS Safari
      if (/iPad|iPhone|iPod|Macintosh/i.test(ua)) {
        window.location.replace(links.apple);
        return;
      }

      // Windows
      if (/Win/i.test(ua)) {
        window.location.replace(links.windows);
        return;
      }

      // Linux
      if (/Linux/i.test(ua) && !/Android/i.test(ua)) {
        window.location.replace(links.linux);
        return;
      }

      // Unknown device → show buttons
      window.addEventListener('DOMContentLoaded', () => {
        document.body.style.display = 'flex';
      });
    })();
  </script>
</head>

<body>
  <div class="container">
    <h1>Select your platform</h1>

    <div class="buttons">
      <a href="https://play.google.com/store/apps/details?id=app.hiddify.com">
        Android
      </a>

      <a href="https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973">
        iOS / macOS
      </a>

      <a href="https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe">
        Windows
      </a>

      <a href="https://github.com/hiddify/hiddify-next/releases/latest">
        Linux
      </a>
    </div>
  </div>
</body>
</html>
