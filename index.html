<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Download Happ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      background: #f4f8fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #17212b;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 28px;
      border: 1px solid #dce8f1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 40px rgba(23, 33, 43, 0.08);
    }

    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      color: #6b7f90;
      text-align: center;
      line-height: 1.45;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .buttons[hidden] {
      display: none;
    }

    a {
      display: block;
      text-decoration: none;
      background: #2aabee;
      color: white;
      padding: 15px 18px;
      border-radius: 8px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      box-shadow: 0 2px 0 rgba(23, 33, 43, 0.06);
      transition: background 120ms ease, transform 120ms ease;
    }

    a:hover {
      background: #229ed9;
      transform: translateY(-1px);
    }

    a:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 22px;
      }
    }
  </style>

  <script>
    (() => {
      const links = {
        android: 'https://play.google.com/store/apps/details?id=app.hiddify.com',
        windows: 'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe',
        linux: 'https://github.com/Happ-proxy/happ-desktop/releases/latest'
      };

      const ua = navigator.userAgent || navigator.vendor || window.opera || '';

      if (/android/i.test(ua)) {
        window.location.replace(links.android);
        return;
      }

      if (/iPad|iPhone|iPod|Macintosh/i.test(ua)) {
        window.addEventListener('DOMContentLoaded', () => {
          document.body.style.display = 'flex';
          document.querySelector('[data-apple-buttons]').hidden = false;
          document.querySelector('[data-all-buttons]').hidden = true;
        });
        return;
      }

      if (/Win/i.test(ua)) {
        window.location.replace(links.windows);
        return;
      }

      if (/Linux/i.test(ua)) {
        window.location.replace(links.linux);
        return;
      }

      window.addEventListener('DOMContentLoaded', () => {
        document.body.style.display = 'flex';
        document.querySelector('[data-all-buttons]').hidden = false;
      });
    })();
  </script>
</head>

<body>
  <div class="container">
    <div class="buttons" data-apple-buttons hidden>
      <a href="https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973">
        iOS / macOS (ru)
      </a>
      <a href="https://apps.apple.com/us/app/happ-proxy-utility/id6504287215">
        iOS / macOS (global)
      </a>
    </div>
    <div class="buttons" data-all-buttons hidden>
      <a href="https://play.google.com/store/apps/details?id=app.hiddify.com">
        Android
      </a>
      <a href="https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973">
        iOS / macOS (ru)
      </a>
      <a href="https://apps.apple.com/us/app/happ-proxy-utility/id6504287215">
        iOS / macOS (global)
      </a>
      <a href="https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe">
        Windows
      </a>
      <a href="https://github.com/Happ-proxy/happ-desktop/releases/latest">
        Linux
      </a>
    </div>
  </div>
</body>
</html>
