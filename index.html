<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting ...</title>
    <meta name="description"
      content="This page will redirect you to our app in the app store.">
    <script type="text/javascript">
      function executeRedirect() {
        const debug = true;
    
        const googleStoreUrl =
          'https://play.google.com/store/apps/details?id=app.hiddify.com';
    
        const appleStoreUrl =
          'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973';
    
        const windowsUrl =
          'https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe';
    
        const linuxUrl =
          'https://github.com/hiddify/hiddify-next/releases/latest';
    
        const fallbackStoreUrl =
          'https://www.happ.su/main/ru';
    
        const userAgent =
          navigator.userAgent || navigator.vendor || window.opera;
    
        // Android
        if (/android/i.test(userAgent)) {
          if (debug) alert('Detected: Android device');
    
          window.location.href = googleStoreUrl;
          return;
        }
    
        // iPhone / iPad / macOS Safari
        if (
          /iPad|iPhone|iPod|Macintosh/i.test(userAgent) &&
          navigator.vendor &&
          navigator.vendor.includes('Apple')
        ) {
          if (debug) alert('Detected: Apple device');
    
          window.location.href = appleStoreUrl;
          return;
        }
    
        // Windows
        if (/Win/i.test(userAgent)) {
          if (debug) alert('Detected: Windows device');
    
          window.location.href = windowsUrl;
          return;
        }
    
        // Linux
        if (/Linux/i.test(userAgent) && !/Android/i.test(userAgent)) {
          if (debug) alert('Detected: Linux device');
    
          window.location.href = linuxUrl;
          return;
        }
    
        // Fallback
        if (debug) {
          alert('Detected: Unknown device. Redirecting to fallback.');
        }
    
        window.location.href = fallbackStoreUrl;
      }
    </script>
    <style>
      .ci-color,
      a {
        background-color: #2E90D0 !important;
        color: #FFF;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        background-color: #6b6b6b;
        color: #FFF;
        font-family: 'Verdana', 'Arial', sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      body {
        background: linear-gradient(160deg, rgba(71, 71, 71, 0.8) 20%,
            rgba(119, 119, 119, 0.5) 20%,
            rgba(77, 77, 77, 0.5) 35%,
            rgba(53, 53, 53, 0.6) 35%,
            rgba(56, 56, 56, 0.8) 45%,
            rgba(43, 43, 43, 0.5) 45%,
            rgba(46, 46, 46, 0.8) 75%,
            rgba(82, 82, 82, 0.5) 75%),
          linear-gradient(45deg, rgba(31, 31, 31, 0.8) 0%,
            rgba(46, 46, 46, 0.8) 50%,
            rgba(128, 128, 128, 0.8) 50%,
            rgba(133, 146, 173, 0.8) 100%) #6b6b6b;
      }

      h1 {
        font-size: 1.6em;
      }

      div#container {
        width: 100%;
        max-width: 920px;
        text-align: center;
        overflow: visible;
      }

      .subtitle {
        font-style: italic;
      }

      .button-wrapper {
        border: 1px #000 solid;
        /* border-radius: 20px; */
        margin: 20px;
        padding: 20px;
        background-color: #FFF;
        text-align: center;
        transition: 1s;
        box-shadow: 6px 6px 0 #000;
        transform: skewX(-15deg);
      }

      .button-wrapper::after {
        content: '';
        width: 60px;
        height: 30px;
        transform: skewX(-15deg);
        border: 1px solid #FFF;
        position: absolute;
        z-index: -1;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: pulse 3s infinite;
      }

      @keyframes pulse {
        0% {
          width: 100%;
          height: 100%;
          opacity: 0.8;
        }

        100% {
          width: 300%;
          max-width: 100vw;
          height: 300%;
          max-height: 100vh;
          opacity: 0;
        }
      }

      .row {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .column {
        flex: 50%;
        min-width: 300px;
      }
    </style>
  </head>

  <body>
    <div id="container">
      <h1>You will now be redirected to our Apps, based on your device ...</h1>
      <p class="subtitle">Otherwise select one of:</p>
      <div id="stores" class="row">
        <div class="store column" id="g">
          <div class="button-wrapper ci-color">
            <a href="https://play.google.com/store/apps/details?id=app.hiddify.com"
              id="google-store-link"><strong>[Hiddify]</strong><br />in Google Play
              Store</a>
          </div>
        </div>
        <div class="store column" id="a">
          <div class="button-wrapper ci-color">

              id="apple-store-link"><strong>[Happ]</strong><br />in Apple App
              Store</a>
          </div>
        </div>
      </div>

    </div>
    <script type="text/javascript">
      executeRedirect();
    </script>
  </body>

</html>
